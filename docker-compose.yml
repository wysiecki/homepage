services:
  homepage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wysiecki-homepage-next
    expose:
      - "3000"
    restart: unless-stopped
    environment:
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_TO=${MAIL_TO:-info@wysiecki.de}
      - MAIL_FROM=${MAIL_FROM:-}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET:-}
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      - ANALYTICS_TOKEN=${ANALYTICS_TOKEN:-}
      - ANALYTICS_SALT=${ANALYTICS_SALT:-}
      - ANALYTICS_DB_PATH=/data/analytics.db
      - BLOG_API_KEY=${BLOG_API_KEY:-}
      - BLOG_DB_PATH=/data/blog.db
    volumes:
      - homepage-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=cloudflare"
      - "traefik.http.routers.homepage.rule=Host(`wysiecki.de`) || Host(`www.wysiecki.de`)"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

volumes:
  homepage-data:

networks:
  default:
    external: true
    name: mvw-net
