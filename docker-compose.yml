services:
  homepage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wysiecki-homepage
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api
    # volumes:
    #   # For development: uncomment to enable live reload of static files
    #   - ./index.html:/usr/share/nginx/html/index.html:ro
    #   - ./script.js:/usr/share/nginx/html/script.js:ro
    #   - ./dist:/usr/share/nginx/html/dist:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.wysiecki.homepage.description=Martin von Wysiecki's Portfolio Homepage"
      - "com.wysiecki.homepage.version=1.0.0"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wysiecki-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_TO=${MAIL_TO:-info@wysiecki.de}
      - MAIL_FROM=${MAIL_FROM:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Development container with hot-reload
  homepage-dev:
    image: node:22-alpine
    container_name: wysiecki-homepage-dev
    working_dir: /app
    volumes:
      - .:/app
    command: npm run dev
    ports:
      - "3001:3000"
    profiles:
      - dev
