<!doctype html>
<html lang="de" class="scroll-smooth dark">
  <head>
    <!-- PARTIAL:head -->
    <title>KI-Radar — Live KI-News, Forschung &amp; Trends | wysiecki.de</title>
    <meta
      name="description"
      content="Bleiben Sie auf dem Laufenden mit den neuesten KI-News, Forschungsarbeiten, Tutorials und angesagten Open-Source-Projekten. Kuratiert von HackerNews, Dev.to, arXiv und GitHub."
    />
    <link rel="canonical" href="https://wysiecki.de/de/ai/" />
    <meta property="og:title" content="KI-Radar — Live KI-News &amp; Trends" />
    <meta
      property="og:description"
      content="Live-KI-News-Hub: Trending-Storys, Tutorials, Forschungsarbeiten und Open-Source-Projekte."
    />
    <meta property="og:url" content="https://wysiecki.de/de/ai/" />
    <meta property="og:type" content="website" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "KI-Radar",
        "description": "Live-KI-News-Aggregator mit Trending-Storys, Tutorials, Forschungsarbeiten und Open-Source-Projekten",
        "url": "https://wysiecki.de/de/ai/",
        "applicationCategory": "NewsApplication",
        "author": {
          "@type": "Person",
          "name": "Martin von Wysiecki"
        }
      }
    </script>
  </head>
  <body class="grain">
    <!-- PARTIAL:nav -->

    <main class="pt-32 pb-24">
      <div class="max-w-6xl mx-auto px-6 lg:px-8">
        <!-- Header -->
        <div class="reveal mb-10">
          <p class="section-label">KI-Radar</p>
          <h1 class="section-heading mb-3">
            Live KI-<br />
            <span class="text-primary">News &amp; Trends</span>
          </h1>
          <p class="text-on-surface/50 text-lg max-w-xl">
            Echtzeit-KI-Inhalte von HackerNews, Dev.to, arXiv und GitHub. Bei jedem Besuch
            aktualisiert.
          </p>
        </div>

        <!-- Tab Navigation -->
        <div class="reveal mb-8">
          <div class="flex flex-wrap gap-2 border-b border-outline-variant/20 pb-px" role="tablist">
            <button class="ai-tab active" role="tab" aria-selected="true" data-tab="trending">
              Trending
            </button>
            <button class="ai-tab" role="tab" aria-selected="false" data-tab="tutorials">
              Tutorials
            </button>
            <button class="ai-tab" role="tab" aria-selected="false" data-tab="research">
              Forschung
            </button>
            <button class="ai-tab" role="tab" aria-selected="false" data-tab="opensource">
              Open Source
            </button>
          </div>
        </div>

        <!-- Tab Content Panels -->

        <!-- Trending (HackerNews) -->
        <div id="panel-trending" class="ai-panel active" role="tabpanel">
          <div id="trending-content" class="space-y-4">
            <!-- Skeleton loaders -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>

        <!-- Tutorials (Dev.to) -->
        <div id="panel-tutorials" class="ai-panel" role="tabpanel" hidden>
          <div id="tutorials-content" class="space-y-4">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>

        <!-- Research (arXiv via proxy) -->
        <div id="panel-research" class="ai-panel" role="tabpanel" hidden>
          <div id="research-content" class="space-y-4">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>

        <!-- Open Source (GitHub) -->
        <div id="panel-opensource" class="ai-panel" role="tabpanel" hidden>
          <div id="opensource-content" class="space-y-4">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>

        <!-- Error state (hidden by default) -->
        <div id="ai-error" class="hidden mt-8 card p-8 text-center">
          <p class="text-on-surface/50 mb-4">
            Inhalte konnten nicht geladen werden. Bitte versuchen Sie es sp&auml;ter erneut.
          </p>
          <button id="ai-retry" class="btn-ghost text-sm">Erneut versuchen</button>
        </div>
      </div>
    </main>

    <!-- PARTIAL:footer -->
    <script src="/shared.js"></script>
    <script src="/ai-radar.js"></script>
  </body>
</html>
