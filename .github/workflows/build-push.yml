name: Build, Push and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push homepage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            whyzzie/homepage:latest
            whyzzie/homepage:${{ github.sha }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            whyzzie/homepage-api:latest
            whyzzie/homepage-api:${{ github.sha }}

      - name: Deploy to production
        run: |
          curl -sf -X POST https://deploy.wysiecki.de/deploy \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}"
