<!doctype html>
<html lang="en" class="scroll-smooth dark">
  <head>
    <!-- PARTIAL:head -->
    <title>{{TITLE}} — Martin von Wysiecki</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="canonical" href="https://wysiecki.de/blog/{{SLUG}}/" />
    <link rel="alternate" type="application/rss+xml" title="Blog RSS" href="/feed.xml" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:url" content="https://wysiecki.de/blog/{{SLUG}}/" />
    <meta property="og:type" content="article" />
    <meta property="article:published_time" content="{{DATE_ISO}}" />
    <meta property="article:author" content="Martin von Wysiecki" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "{{TITLE}}",
        "description": "{{DESCRIPTION}}",
        "datePublished": "{{DATE_ISO}}",
        "author": {
          "@type": "Person",
          "name": "Martin von Wysiecki",
          "url": "https://wysiecki.de"
        },
        "publisher": {
          "@type": "Person",
          "name": "Martin von Wysiecki"
        },
        "url": "https://wysiecki.de/blog/{{SLUG}}/"
      }
    </script>
  </head>
  <body class="grain">
    <!-- PARTIAL:nav -->

    <main class="pt-32 pb-24">
      <div class="max-w-3xl mx-auto px-6 lg:px-8">
        <!-- Breadcrumb -->
        <nav class="mb-8 reveal">
          <ol class="flex items-center gap-2 font-mono text-xs text-on-surface/40">
            <li><a href="/" class="hover:text-primary transition-colors">Home</a></li>
            <li>/</li>
            <li><a href="/blog/" class="hover:text-primary transition-colors">Blog</a></li>
            <li>/</li>
            <li class="text-primary truncate max-w-[200px]">{{TITLE}}</li>
          </ol>
        </nav>

        <!-- Article Header -->
        <header class="reveal mb-12">
          <div class="flex flex-wrap items-center gap-3 mb-4">{{TAGS_HTML}}</div>
          <h1 class="font-display text-3xl md:text-5xl font-bold tracking-tight leading-tight mb-4">
            {{TITLE}}
          </h1>
          <div class="flex items-center gap-4 text-sm font-mono text-on-surface/40">
            <time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
            <span>&middot;</span>
            <span>{{READING_TIME}} min read</span>
          </div>
        </header>

        <!-- Article Content -->
        <article class="prose reveal">{{CONTENT}}</article>

        <!-- Back to blog -->
        <div class="mt-16 pt-8 reveal" style="border-top: 1px solid rgba(72, 69, 83, 0.15)">
          <a
            href="/blog/"
            class="inline-flex items-center gap-2 text-sm font-mono text-on-surface/40 hover:text-primary transition-colors"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
              />
            </svg>
            Back to all posts
          </a>
        </div>
      </div>
    </main>

    <!-- PARTIAL:footer -->
    <script src="/shared.js"></script>
  </body>
</html>
